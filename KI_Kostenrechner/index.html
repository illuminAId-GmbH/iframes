<iframe
  srcdoc='<!DOCTYPE html><html><head><meta charset="utf-8"><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:#fff;color:#111}.wrap{display:flex;gap:24px;padding:1rem;align-items:flex-start}.sidebar{min-width:220px;max-width:240px;display:flex;flex-direction:column;gap:14px}.param{display:flex;flex-direction:column;gap:4px}.param-name{font-size:13px;color:#111;font-weight:500}.param-label{font-size:11px;color:#888}.param-row{display:flex;align-items:center;gap:8px}.param-row input[type=range]{flex:1;accent-color:#3266ad}.param-val{font-size:12px;color:#555;min-width:62px;text-align:right}.chartarea{flex:1;min-width:0}</style></head><body><div class="wrap"><div class="sidebar"><div class="param"><div class="param-name">Trainingskosten</div><div class="param-row"><input type="range" id="s_train" min="0" max="500000" step="500" value="10000"><span class="param-val" id="v_train">10.000 €</span></div></div><div class="param"><div class="param-name">Nutzungskosten</div><div class="param-label">pro Nutzung</div><div class="param-row"><input type="range" id="s_inf" min="0" max="5" step="0.01" value="0.01"><span class="param-val" id="v_inf">0,01 €</span></div></div><div class="param"><div class="param-name">Menschliche Kosten</div><div class="param-label">pro Aufgabe</div><div class="param-row"><input type="range" id="s_human" min="0.01" max="500" step="0.01" value="1"><span class="param-val" id="v_human">1,00 €</span></div></div><div class="param"><div class="param-name">Anzahl Trainings</div><div class="param-row"><input type="range" id="s_trainfreq" min="1" max="52" step="1" value="1"><span class="param-val" id="v_trainfreq">1</span></div></div><div class="param"><div class="param-name">Datenaufbereitung Training</div><div class="param-label">einmalig</div><div class="param-row"><input type="range" id="s_dataprep" min="0" max="500000" step="500" value="0"><span class="param-val" id="v_dataprep">0 €</span></div></div><div class="param"><div class="param-name">Datenaufbereitung Nutzung</div><div class="param-label">pro Nutzung</div><div class="param-row"><input type="range" id="s_datause" min="0" max="5" step="0.01" value="0"><span class="param-val" id="v_datause">0,00 €</span></div></div></div><div class="chartarea"><div style="position:relative;width:100%;height:360px;"><canvas id="myChart"></canvas></div></div></div><script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script><script>const fmt=n=>n>=1000?n.toLocaleString("de-DE",{maximumFractionDigits:0})+" €":n.toLocaleString("de-DE",{minimumFractionDigits:2,maximumFractionDigits:2})+" €";const sliders=[{id:"s_train",val:"v_train",fn:fmt},{id:"s_dataprep",val:"v_dataprep",fn:fmt},{id:"s_trainfreq",val:"v_trainfreq",fn:n=>n},{id:"s_inf",val:"v_inf",fn:fmt},{id:"s_datause",val:"v_datause",fn:fmt},{id:"s_human",val:"v_human",fn:fmt}];sliders.forEach(s=>{const el=document.getElementById(s.id);const out=document.getElementById(s.val);el.addEventListener("input",()=>{out.textContent=s.fn(parseFloat(el.value));update();});});const N=100;function getXPoints(){const pts=[];for(let i=0;i<=N;i++){pts.push(Math.round(Math.pow(10,3+i/N*6)));}return[...new Set(pts)].sort((a,b)=>a-b);}const xPts=getXPoints();function calcKI(n){const train=parseFloat(document.getElementById("s_train").value);const dataprep=parseFloat(document.getElementById("s_dataprep").value);const trainfreq=parseFloat(document.getElementById("s_trainfreq").value);const inf=parseFloat(document.getElementById("s_inf").value);const datause=parseFloat(document.getElementById("s_datause").value);return(train+dataprep)*trainfreq/n+inf+datause;}function findBreakeven(){const human=parseFloat(document.getElementById("s_human").value);for(let i=0;i<xPts.length-1;i++){const a=calcKI(xPts[i]);const b=calcKI(xPts[i+1]);if((a-human)*(b-human)<=0){const frac=(human-a)/(b-a);return Math.round(xPts[i]+frac*(xPts[i+1]-xPts[i]));}}return null;}const endLabelPlugin={id:"endLabel",afterDatasetsDraw(chart){const ctx=chart.ctx;const meta0=chart.getDatasetMeta(0);const meta1=chart.getDatasetMeta(1);ctx.save();ctx.font="500 12px system-ui,sans-serif";ctx.textBaseline="middle";[{meta:meta0,color:"#3266ad",label:"KI"},{meta:meta1,color:"#B85C38",label:"Mensch"}].forEach(({meta,color,label})=>{const pts=meta.data.filter(p=>p&&!isNaN(p.x)&&!isNaN(p.y));if(!pts.length)return;const last=pts[pts.length-1];ctx.fillStyle=color;ctx.fillText(label,last.x+6,last.y);});ctx.restore();}};const breakEvenLabelPlugin={id:"beLabelPlugin",afterDatasetsDraw(chart){const meta=chart.getDatasetMeta(2);if(!meta.data.length)return;const pt=meta.data[0];if(!pt||isNaN(pt.x)||isNaN(pt.y))return;const be=chart.data.datasets[2]._beVal;if(!be)return;const ctx=chart.ctx;ctx.save();ctx.font="500 11px system-ui,sans-serif";ctx.fillStyle="#2d7d46";ctx.textBaseline="bottom";ctx.textAlign="left";ctx.fillText("Break-even: "+be.toLocaleString("de-DE")+" Nutzungen",pt.x+10,pt.y-4);ctx.restore();}};const ctx=document.getElementById("myChart").getContext("2d");const chart=new Chart(ctx,{type:"line",data:{labels:xPts,datasets:[{label:"KI",data:xPts.map(n=>calcKI(n)),borderColor:"#3266ad",backgroundColor:"rgba(50,102,173,0.07)",borderWidth:2,pointRadius:0,fill:false,tension:0.3},{label:"Mensch",data:xPts.map(()=>parseFloat(document.getElementById("s_human").value)),borderColor:"#B85C38",borderWidth:1.5,borderDash:[6,4],pointRadius:0,fill:false},{label:"Break-even",data:[],pointStyle:"circle",pointRadius:7,pointBackgroundColor:"#2d7d46",pointBorderColor:"#2d7d46",showLine:false,fill:false,_beVal:null}]},options:{responsive:true,maintainAspectRatio:false,animation:{duration:180},layout:{padding:{right:52}},interaction:{mode:"index",intersect:false},plugins:{legend:{display:false},tooltip:{callbacks:{title:items=>items[0].label.toLocaleString("de-DE")+" Nutzungen",label:item=>{if(item.datasetIndex===2)return null;return item.dataset.label+": "+fmt(item.raw);}}}},scales:{x:{type:"logarithmic",min:1000,max:1000000000,title:{display:true,text:"Anzahl KI-Nutzungen",font:{size:12},color:"#888"},ticks:{maxTicksLimit:8,callback:v=>{const vals=[1000,10000,100000,1000000,10000000,100000000,1000000000];if(vals.includes(v)){if(v>=1000000000)return"1Mrd";if(v>=1000000)return(v/1000000)+"Mio";return(v/1000)+"k";}return null;}},grid:{color:"rgba(128,128,128,0.1)"}},y:{type:"logarithmic",title:{display:true,text:"Kosten pro Nutzung (€)",font:{size:12},color:"#888"},ticks:{callback:v=>{const vals=[0.001,0.01,0.1,1,10,100,1000,10000];if(vals.some(ref=>Math.abs(v-ref)/ref<0.01))return fmt(v);return null;}},grid:{color:"rgba(128,128,128,0.1)"}}}},plugins:[endLabelPlugin,breakEvenLabelPlugin]});function update(){const human=parseFloat(document.getElementById("s_human").value);chart.data.datasets[0].data=xPts.map(n=>calcKI(n));chart.data.datasets[1].data=xPts.map(()=>human);const be=findBreakeven();if(be&&be<=1000000000){chart.data.datasets[2].data=[{x:be,y:human}];chart.data.datasets[2]._beVal=be;}else{chart.data.datasets[2].data=[];chart.data.datasets[2]._beVal=null;}chart.update();}update();</script></body></html>'
